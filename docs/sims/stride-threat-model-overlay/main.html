<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>STRIDE Threat Model Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 12px; font-family: 'Segoe UI', Arial, sans-serif; background: #fff; color: #212529; }
        h2 { margin: 0 0 6px 0; color: #1a3a6c; font-size: 16px; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; align-items: center; font-size: 12px; }
        button { background: #1a3a6c; color: white; border: none; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
        button:hover { background: #2e5285; }
        button.active { background: #FF7043; }
        .legend { display: flex; gap: 10px; font-size: 10px; flex-wrap: wrap; margin: 4px 0; }
        .legend span { padding: 2px 6px; border-radius: 3px; color: white; font-weight: bold; }
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 10px; height: 540px; }
        @media (max-width: 700px) { .layout { grid-template-columns: 1fr; height: auto; } #network { height: 380px !important; } }
        #network { border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc; height: 100%; }
        #side-panel { border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc; padding: 10px; overflow-y: auto; height: 100%; font-size: 12px; }
        #panel-title { font-size: 13px; font-weight: bold; color: #1a3a6c; margin-bottom: 6px; }
        #panel-body p { margin: 4px 0; }
    </style>
</head>
<body>
    <h2>STRIDE Threat Model — Web App DFD Overlay</h2>
    <div class="legend">
        <span style="background:#1976D2;">S</span>poofing
        <span style="background:#FF7043;">T</span>ampering
        <span style="background:#FFA000;">R</span>epudiation
        <span style="background:#7B1FA2;">I</span>nfo Disclosure
        <span style="background:#C62828;">D</span>oS
        <span style="background:#43A047;">E</span>lev. of Privilege
    </div>
    <div class="controls">
        <button id="toggle-mit">Show Mitigations</button>
        <button id="reveal-all">Reveal All Threats</button>
        <span style="color:#666;">Click any element for STRIDE applicable to it.</span>
    </div>
    <div class="layout">
        <div id="network"></div>
        <div id="side-panel">
            <div id="panel-title"></div>
            <div id="panel-body"></div>
        </div>
    </div>
    <script src="stride-threat-model-overlay.js"></script>
</body>
</html>
