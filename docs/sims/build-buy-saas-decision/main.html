<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Build vs Buy vs SaaS Decision</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 12px; font-family: 'Segoe UI', Arial, sans-serif; background: #fff; color: #212529; }
        h2 { margin: 0 0 6px 0; color: #1a3a6c; font-size: 16px; }
        .legend { display: flex; gap: 14px; font-size: 11px; color: #555; margin-bottom: 6px; flex-wrap: wrap; }
        .legend i { display: inline-block; width: 14px; height: 14px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
        .layout { display: grid; grid-template-columns: 1fr 280px; gap: 10px; height: 580px; }
        @media (max-width: 700px) { .layout { grid-template-columns: 1fr; height: auto; } #network { height: 380px !important; } }
        #network { border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc; height: 100%; }
        #side-panel { border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc; padding: 10px; overflow-y: auto; height: 100%; font-size: 12px; }
        #panel-title { font-size: 13px; font-weight: bold; color: #1a3a6c; margin-bottom: 6px; }
        #panel-body p { margin: 4px 0; }
    </style>
</head>
<body>
    <h2>Build vs Buy vs SaaS Decision Tree</h2>
    <div class="legend">
        <span><i style="background:#455A64;"></i>Question</span>
        <span><i style="background:#43A047;"></i>Build</span>
        <span><i style="background:#1E88E5;"></i>Buy</span>
        <span><i style="background:#FF7043;"></i>SaaS</span>
        <span style="color:#666;">— click any node for examples and failure modes.</span>
    </div>
    <div class="layout">
        <div id="network"></div>
        <div id="side-panel">
            <div id="panel-title"></div>
            <div id="panel-body"></div>
        </div>
    </div>
    <script src="build-buy-saas-decision.js"></script>
</body>
</html>
