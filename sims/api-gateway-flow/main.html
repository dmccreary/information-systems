<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>API Gateway Request Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 12px; font-family: 'Segoe UI', Arial, sans-serif; background: #fff; color: #212529; }
        h2 { margin: 0 0 6px 0; color: #1a3a6c; font-size: 16px; }
        .controls {
            display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; align-items: center;
            font-size: 13px;
        }
        button {
            background: #1a3a6c; color: white; border: none; padding: 7px 12px;
            border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
        }
        button:hover { background: #2e5285; }
        button.active { background: #FF7043; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        select { padding: 6px 10px; font-size: 12px; border-radius: 4px; border: 1px solid #ced4da; }
        .layout { display: grid; grid-template-columns: 1fr 280px; gap: 10px; height: 480px; }
        @media (max-width: 700px) { .layout { grid-template-columns: 1fr; height: auto; } #network { height: 360px !important; } }
        #network { border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc; height: 100%; }
        #side-panel {
            border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc;
            padding: 10px; overflow-y: auto; height: 100%;
        }
        #panel-title { font-size: 12px; font-weight: bold; color: #1a3a6c; margin-bottom: 8px; }
        .concern { display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px; }
        .step-num {
            background: #1a3a6c; color: white; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .detail { color: #555; }
    </style>
</head>
<body>
    <h2>API Gateway Request Flow</h2>
    <div class="controls">
        <label>Target service:
            <select id="target-service">
                <option value="orders">Orders</option>
                <option value="inventory">Inventory</option>
                <option value="customer">Customer</option>
            </select>
        </label>
        <button id="trace-btn">Send Request &rarr;</button>
        <button id="no-gateway">Show Without Gateway</button>
        <span style="color:#555;">Tip: click any node for details.</span>
    </div>
    <div class="layout">
        <div id="network"></div>
        <div id="side-panel">
            <div id="panel-title"></div>
            <div id="panel-body"></div>
        </div>
    </div>
    <script src="api-gateway-flow.js"></script>
</body>
</html>
