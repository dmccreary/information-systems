<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Six-Component Model of an Information System</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div id="network"></div>

        <div class="title">Six-Component Model of an Information System</div>

        <div class="right-panel">
            <div class="scenario-selector">
                <label for="scenario-select"><strong>Scenario:</strong></label>
                <select id="scenario-select">
                    <option value="hospital">Hospital Admission</option>
                    <option value="loan">Loan Approval</option>
                    <option value="university">Course Registration</option>
                </select>
            </div>

            <div class="info-panel">
                <div class="info-header" id="info-header">
                    <span class="info-swatch" id="info-swatch"></span>
                    <span class="info-title" id="info-title">Click a component</span>
                </div>
                <div class="info-body" id="info-body">
                    <p class="info-hint">Click any of the six nodes to see how that component plays its role in the selected scenario.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="six-component-model.js"></script>
</body>
</html>
