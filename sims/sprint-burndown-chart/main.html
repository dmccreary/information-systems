<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Sprint Burndown Chart (Ideal vs Actual)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #212529;
        }
        main { max-width: 100%; }
        .controls {
            margin: 8px 0 12px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        button {
            background: #1a3a6c;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        button:hover { background: #2e5285; }
        button.active { background: #FF7043; }
        .chart-container {
            position: relative;
            width: 100%;
            height: 360px;
            margin-bottom: 12px;
        }
        .chart-container.small {
            height: 200px;
        }
        #outcome-summary {
            background: #f8f9fa;
            padding: 10px 14px;
            border-left: 4px solid #C2185B;
            border-radius: 4px;
            font-size: 13px;
            margin: 8px 0 14px 0;
        }
        .legend-note {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <main>
        <div class="controls">
            <button id="toggle-forecast">Show Velocity Forecast</button>
            <span class="legend-note">Tip: hover any data point on the actual line to see what happened that day.</span>
        </div>
        <div class="chart-container">
            <canvas id="burndown-chart"></canvas>
        </div>
        <div id="outcome-summary"></div>
        <div class="chart-container small">
            <canvas id="velocity-chart"></canvas>
        </div>
    </main>
    <script src="sprint-burndown-chart.js"></script>
</body>
</html>
