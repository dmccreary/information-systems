<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>EVM Cost and Schedule Variance Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #212529;
        }
        main { max-width: 100%; }
        .scenarios {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .scenario-btn {
            background: #e9ecef;
            color: #212529;
            border: 1px solid #ced4da;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .scenario-btn:hover { background: #dee2e6; }
        .scenario-btn.active { background: #1a3a6c; color: white; border-color: #1a3a6c; }
        .chart-container {
            position: relative;
            width: 100%;
            height: 320px;
            margin: 6px 0;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 10px 0;
            font-size: 13px;
        }
        .slider-row input[type=range] {
            flex: 1;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 6px;
            margin: 6px 0;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #1a3a6c;
        }
        .metric .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #6c757d;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .metric .value {
            font-size: 16px;
            font-weight: bold;
            margin-top: 2px;
        }
        .metric-good { color: #00897B; }
        .metric-bad { color: #C2185B; }
        #diagnosis {
            background: #fff3cd;
            border-left: 4px solid #FFA000;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <main>
        <div class="scenarios">
            <span style="font-size: 12px; color: #555; margin-right: 6px; align-self: center;">Scenario:</span>
            <button class="scenario-btn" data-scenario="behind-under">Behind Schedule, Under Budget</button>
            <button class="scenario-btn" data-scenario="ahead-under">Ahead of Schedule, Under Budget</button>
            <button class="scenario-btn" data-scenario="on-over">On Schedule, Over Budget</button>
        </div>
        <div class="chart-container">
            <canvas id="evm-chart"></canvas>
        </div>
        <div class="slider-row">
            <label for="month-slider"><strong>Cursor Month:</strong></label>
            <input type="range" id="month-slider" min="0" max="12" value="6" step="1">
            <span id="m-month">M6</span>
        </div>
        <div class="metrics">
            <div class="metric"><div class="label">PV</div><div class="value" id="m-pv">—</div></div>
            <div class="metric"><div class="label">EV</div><div class="value" id="m-ev">—</div></div>
            <div class="metric"><div class="label">AC</div><div class="value" id="m-ac">—</div></div>
            <div class="metric"><div class="label">CV (EV − AC)</div><div class="value" id="m-cv">—</div></div>
            <div class="metric"><div class="label">SV (EV − PV)</div><div class="value" id="m-sv">—</div></div>
            <div class="metric"><div class="label">CPI (EV ÷ AC)</div><div class="value" id="m-cpi">—</div></div>
            <div class="metric"><div class="label">SPI (EV ÷ PV)</div><div class="value" id="m-spi">—</div></div>
            <div class="metric"><div class="label">EAC (BAC ÷ CPI)</div><div class="value" id="m-eac">—</div></div>
        </div>
        <div id="diagnosis"></div>
    </main>
    <script src="evm-variance-visualization.js"></script>
</body>
</html>
