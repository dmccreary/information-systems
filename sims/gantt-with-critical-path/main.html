<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Gantt Chart with Critical Path</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #212529;
        }
        h2 {
            margin: 0 0 6px 0;
            color: #1a3a6c;
            font-size: 16px;
        }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            align-items: center;
        }
        button {
            background: #1a3a6c;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        button:hover { background: #2e5285; }
        button.active { background: #FF7043; }
        #timeline {
            border: 1px solid #ced4da;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #555;
            flex-wrap: wrap;
            margin: 6px 0;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .legend i {
            display: inline-block;
            width: 18px;
            height: 12px;
            border-radius: 2px;
        }
        #status-message {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }
        .alert-good { background: #e0f2f1; border-left: 4px solid #00897B; }
        .alert-bad { background: #fce4ec; border-left: 4px solid #C2185B; }
        /* vis-timeline customization */
        .vis-item.task-critical {
            background-color: #C2185B;
            border-color: #880E4F;
            color: white;
            font-weight: 600;
        }
        .vis-item.task-normal {
            background-color: #00897B;
            border-color: #004D40;
            color: white;
            font-weight: 600;
        }
        .vis-item.task-milestone {
            background-color: #FFA000;
            border-color: #E65100;
            color: #333;
            font-weight: 700;
        }
        .vis-item.task-slack {
            background-color: rgba(255, 112, 67, 0.20);
            border-color: rgba(255, 112, 67, 0.4);
        }
        .vis-label.vis-group-level-0 { font-size: 11px; }
    </style>
</head>
<body>
    <h2>CRM Rollout — 12-Week Gantt Chart with Critical Path</h2>
    <div class="controls">
        <button id="toggle-slack">Show Slack on Non-Critical Tasks</button>
        <button id="reset-schedule">Reset Schedule</button>
        <span style="font-size: 12px; color: #555;">Tip: drag any task bar to a new start date.</span>
    </div>
    <div class="legend">
        <span><i style="background:#C2185B;"></i>Critical Path</span>
        <span><i style="background:#00897B;"></i>Non-Critical (has slack)</span>
        <span><i style="background:#FFA000;"></i>Milestone</span>
        <span><i style="background:rgba(255,112,67,0.20); border:1px solid rgba(255,112,67,0.4);"></i>Slack</span>
    </div>
    <div id="timeline" style="height: 500px;"></div>
    <div id="status-message"></div>
    <script src="gantt-with-critical-path.js"></script>
</body>
</html>
