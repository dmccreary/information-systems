<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Privacy Regulatory Landscape</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 12px; font-family: 'Segoe UI', Arial, sans-serif; background: #fff; color: #212529; }
        h2 { margin: 0 0 6px 0; color: #1a3a6c; font-size: 16px; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; align-items: center; font-size: 12px; }
        select { padding: 6px 10px; font-size: 12px; border-radius: 4px; border: 1px solid #ced4da; }
        .layout { display: grid; grid-template-columns: 1fr 280px; gap: 10px; height: 540px; }
        @media (max-width: 700px) { .layout { grid-template-columns: 1fr; height: auto; } #network { height: 380px !important; } }
        #network { border: 1px solid #ced4da; border-radius: 4px; background: linear-gradient(135deg, #f8f9fa 0%, #e3f2fd 100%); height: 100%; }
        #side-panel { border: 1px solid #ced4da; border-radius: 4px; background: #fafbfc; padding: 10px; overflow-y: auto; height: 100%; font-size: 12px; }
        #panel-title { font-size: 13px; font-weight: bold; color: #1a3a6c; margin-bottom: 6px; }
        #panel-body p { margin: 4px 0; }
    </style>
</head>
<body>
    <h2>Privacy &amp; Compliance Regulatory Landscape</h2>
    <div class="controls">
        <label>Filter by data type:
            <select id="data-filter">
                <option value="">— show all —</option>
                <option value="health">Health (PHI)</option>
                <option value="finance">Finance (financial reporting)</option>
                <option value="card">Card (payment)</option>
                <option value="generic-personal">Generic personal info</option>
            </select>
        </label>
        <span style="color:#666;">Click any node for year, regulator, penalty, summary.</span>
    </div>
    <div class="layout">
        <div id="network"></div>
        <div id="side-panel">
            <div id="panel-title"></div>
            <div id="panel-body"></div>
        </div>
    </div>
    <script src="privacy-regulatory-landscape.js"></script>
</body>
</html>
