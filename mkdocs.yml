site_name: 'Information Systems'
site_description: 'An ABET CAC-aligned intelligent textbook covering the foundations of information systems in the age of AI — application development, data management, IS project management, networks and telecommunications for business, security of information assets, and the role of IS in organizations.'
site_author: 'Dan McCreary'
site_url: 'https://dmccreary.github.io/information-systems/'

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/dmccreary/information-systems'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary'

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  static_templates:
    - 404.html
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

# Custom CSS
extra_css:
  - css/extra.css
  - css/mascot.css

# Extra
extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dmccreary/information-systems

